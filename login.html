<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMed - Log In</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <div class="login-container">
        <h2>GMed Portal Login</h2>
        <form id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <p class="signup-link">Wala pa kay account? <a href="register.html">Sign up diri</a></p>
    </div>

    <!-- FIREBASE LOGIN SCRIPT -->
    <script type="module">
        import { auth, signInWithEmailAndPassword } from "./firebase-config.js";

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                // I-authenticate ang user gamit ang Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);
                
                // Kung sakto, dad-on siya sa dashboard / main feed
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert("Sipyat ang pag-login: Siguroha nga sakto ang Email ug Password.");
            }
        });
    </script>

</body>
</html>
