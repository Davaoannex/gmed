<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMed - Dashboard Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e4e6eb;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 580px;
            margin: auto;
        }
        /* Header & Logout */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h1 {
            color: #2374e1;
            margin: 0;
            font-size: 24px;
        }
        .logout-btn {
            background-color: #3a3b3c;
            color: #e4e6eb;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background-color: #4e4f50;
        }
        .welcome-msg {
            text-align: center;
            color: #b0b3b8;
            margin-bottom: 20px;
            font-size: 14px;
            border-bottom: 1px solid #3a3b3c;
            padding-bottom: 15px;
        }
        /* Post Box Setup */
        .post-box, .feed-card {
            background-color: #242526;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .post-box textarea {
            width: 100%;
            height: 80px;
            background-color: #3a3b3c;
            border: none;
            border-radius: 6px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 15px;
        }
        .post-box textarea:focus {
            outline: none;
        }
        .post-btn {
            width: 100%;
            background-color: #2374e1;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .post-btn:hover {
            background-color: #1865cf;
        }
        /* Feed Cards Setup */
        .feed-card .meta {
            font-size: 13px;
            color: #b0b3b8;
            margin-bottom: 10px;
        }
        .feed-card .meta strong {
            color: white;
        }
        .feed-card .content {
            font-size: 16px;
            line-height: 1.4;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }
        /* Actions Area (Like & Comment Layout) */
        .card-actions {
            display: flex;
            border-top: 1px solid #3a3b3c;
            border-bottom: 1px solid #3a3b3c;
            padding: 5px 0;
            margin-bottom: 10px;
        }
        .action-btn {
            flex: 1;
            background: none;
            border: none;
            color: #b0b3b8;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        .action-btn:hover {
            background-color: #3a3b3c;
            color: white;
        }
        /* Comments Section */
        .comments-section {
            background-color: #1c1e21;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .comment-item {
            font-size: 13px;
            margin-bottom: 8px;
            border-bottom: 1px dashed #3a3b3c;
            padding-bottom: 5px;
        }
        .comment-item strong {
            color: #2374e1;
        }
        .comment-form {
            display: flex;
            margin-top: 10px;
        }
        .comment-form input {
            flex: 1;
            background-color: #3a3b3c;
            border: none;
            border-radius: 4px 0 0 4px;
            color: white;
            padding: 6px 10px;
        }
        .comment-form input:focus {
            outline: none;
        }
        .comment-form button {
            background-color: #2374e1;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h1>GMed Feed</h1>
            <button id="logout-button" class="logout-btn">Log Out</button>
        </div>
        
        <div id="welcome-user" class="welcome-msg">Checking session...</div>

        <div class="post-box">
            <form id="post-form">
                <textarea id="post-content" placeholder="Unsay imong gihuna-huna karon?"></textarea>
                <button type="submit" class="post-btn">Post</button>
            </form>
        </div>

        <div id="news-feed">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAEMcZkLwEp7Zlt21aBwy8HZfGmy2-LP7A", 
          authDomain: "gmed-web.firebaseapp.com",
          projectId: "gmed-web",
          storageBucket: "gmed-web.firebasestorage.app",
          messagingSenderId: "1046815257755",
          appId: "1:1046815257755:web:18ba8fa65caff3260d023e",
          measurementId: "G-M0WV44F3TC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const postForm = document.getElementById('post-form');
        const postContent = document.getElementById('post-content');
        const newsFeed = document.getElementById('news-feed');
        const welcomeUser = document.getElementById('welcome-user');
        const logoutButton = document.getElementById('logout-button');

        let currentUserName = "User";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserName = user.email ? user.email.split('@')[0] : "User";
                welcomeUser.innerText = `Naka-login isip: ${user.email}`;
            } else {
                welcomeUser.innerText = "Naka-login isip: Guest Mode (Testing)";
            }
        });

        // Logout
        logoutButton.addEventListener('click', async () => {
            try {
                await signOut(auth);
                alert("Logged out successfully!");
                window.location.href = "login.html";
            } catch (error) {
                console.error(error);
            }
        });

        // Save new post
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = postContent.value.trim();
            if (!text) return;

            try {
                await addDoc(collection(db, "posts"), {
                    content: text,
                    timestamp: new Date().toISOString(),
                    authorName: currentUserName,
                    authorEmail: auth.currentUser ? auth.currentUser.email : "anonymous@gmed.com",
                    likesCount: 0
                });
                postContent.value = ""; 
            } catch (error) {
                alert("Dili makapost: " + error.message);
            }
        });

        // Realtime loader sa feed listahan
        const feedQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        
        onSnapshot(feedQuery, (snapshot) => {
            newsFeed.innerHTML = ""; 

            snapshot.forEach((postDoc) => {
                const post = postDoc.data();
                const postId = postDoc.id;
                const displayAuthor = post.authorEmail || "Anonymous User";
                const likes = post.likesCount || 0;
                
                const card = document.createElement('div');
                card.className = 'feed-card';
                card.innerHTML = `
                    <div class="meta">
                        <strong>${displayAuthor}</strong> • ${new Date(post.timestamp).toLocaleDateString()}
                    </div>
                    <div class="content">${post.content}</div>
                    
                    <div class="card-actions">
                        <button class="action-btn" id="like-btn-${postId}">👍 Like (${likes})</button>
                        <button class="action-btn" id="comment-focus-${postId}">💬 Comment</button>
                    </div>

                    <div class="comments-section">
                        <div id="comments-list-${postId}"></div>
                        <form class="comment-form" id="comment-form-${postId}">
                            <input type="text" id="comment-input-${postId}" placeholder="Pagsuwat og comment..." required>
                            <button type="submit">Send</button>
                        </form>
                    </div>
                `;
                newsFeed.appendChild(card);

                // 1. LIKE BUTTON LOGIC
                document.getElementById(`like-btn-${postId}`).addEventListener('click', async () => {
                    const postRef = doc(db, "posts", postId);
                    try {
                        await updateDoc(postRef, {
                            likesCount: increment(1)
                        });
                    } catch (error) {
                        console.error("Error updating likes: ", error);
                    }
                });

                // 2. LIVE COMMENTS LISTENER FOR THIS POST
                const commentsQuery = query(collection(db, "posts", postId, "comments"), orderBy("timestamp", "asc"));
                onSnapshot(commentsQuery, (commentSnapshot) => {
                    const commentsList = document.getElementById(`comments-list-${postId}`);
                    commentsList.innerHTML = "";
                    
                    commentSnapshot.forEach((cDoc) => {
                        const commentData = cDoc.data();
                        const cDiv = document.createElement('div');
                        cDiv.className = 'comment-item';
                        cDiv.innerHTML = `<strong>${commentData.author}</strong>: ${commentData.text}`;
                        commentsList.appendChild(cDiv);
                    });
                });

                // 3. SUBMIT COMMENT LOGIC
                document.getElementById(`comment-form-${postId}`).addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const inputField = document.getElementById(`comment-input-${postId}`);
                    const commentText = inputField.value.trim();
                    if (!commentText) return;

                    try {
                        await addDoc(collection(db, "posts", postId, "comments"), {
                            text: commentText,
                            author: currentUserName,
                            timestamp: new Date().toISOString()
                        });
                        inputField.value = "";
                    } catch (error) {
                        console.error("Error adding comment: ", error);
                    }
                });
            });
        });
    </script>
</body>
</html>
