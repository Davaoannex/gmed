<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMed - News Feed</title>
    <link rel="stylesheet" href="style.css">

    <!-- KINI NGA SCRIPT ANG MO-AUTOMATIC PAADTO SA LOGIN PAGE -->
    <script>
        // Kung ang user dretso niabli sa link ug wala gikan sa login page, ipasa sa login.html
        if (!document.referrer.includes('login.html')) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>

    <!-- 1. NAVBAR SECTION -->
    <nav class="navbar">
        <div class="nav-left">
            <h2 class="logo">GMed</h2>
        </div>
        <div class="nav-right">
            <button class="logout-btn" onclick="window.location.href='login.html'">Logout</button>
        </div>
    </nav>

    <!-- 2. MAIN CONTAINER -->
    <div class="main-container">
        
        <!-- SIDEBAR (WALA) -->
        <aside class="sidebar-left">
            <div class="profile-card">
                <h3>Welcome back!</h3>
            </div>
        </aside>

        <!-- FEED SECTION (TUNGA) -->
        <main class="feed-section">
            
            <!-- STORIES BAR -->
            <div class="stories-container">
                <div class="story-card add-story">
                    <p>+</p>
                    <span>Create Story</span>
                </div>
                <div class="story-card"><span>Friend 1</span></div>
                <div class="story-card"><span>Friend 2</span></div>
                <div class="story-card"><span>Friend 3</span></div>
            </div>

            <!-- CREATE POST BOX -->
            <div class="create-post-box">
                <textarea id="post-input" placeholder="What's on your mind?"></textarea>
                <button id="post-btn">Post</button>
            </div>

            <!-- POSTS FEED -->
            <div id="posts-container">
                <!-- Dinhi mosulod ang mga posts gikan sa JavaScript -->
                <div class="post">
                    <h4>Sample User</h4>
                    <p>Welcome to GMed! This is a sample post.</p>
                </div>
            </div>

        </main>

        <!-- SIDEBAR (TUO) -->
        <aside class="sidebar-right">
            <div class="contacts-card">
                <h3>Contacts</h3>
                <ul>
                    <li>Active Friend 1</li>
                    <li>Active Friend 2</li>
                </ul>
            </div>
        </aside>

    </div>

    <!-- JAVASCRIPT PARA SA POSTING UG STORIES FUNCTIONALITY -->
    <script>
        const postBtn = document.getElementById('post-btn');
        const postInput = document.getElementById('post-input');
        const postsContainer = document.getElementById('posts-container');

        // Function para mag-add og post
        postBtn.addEventListener('click', function() {
            const postText = postInput.value.trim();
            
            if (postText === "") {
                alert("Palihog pagsulat og mensahe sa dili pa mo-post!");
                return;
            }

            // Paghimo og bag-ong post element
            const newPost = document.createElement('div');
            newPost.classList.add('post');
            newPost.innerHTML = `
                <h4>You</h4>
                <p>${postText}</p>
            `;

            // Ibutang sa pinaka-ibabaw sa feed ang bag-ong post
            postsContainer.insertBefore(newPost, postsContainer.firstChild);

            // I-clear ang text area
            postInput.value = "";
        });
    </script>

</body>
</html>
