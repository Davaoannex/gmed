<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMed - Home Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }
        nav {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav h1 {
            margin: 0;
            font-size: 24px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-name {
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
        .main-content {
            padding: 40px 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .welcome-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <nav>
        <h1>GMed Portal</h1>
        <div class="nav-links">
            <span class="user-name" id="user-display-name">Loading user...</span>
            <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="welcome-card">
            <h2>Welcome to your Dashboard</h2>
            <p>This page is securely protected by Firebase Authentication. Unauthorized users attempting to access this path directly will be redirected to the login panel automatically.</p>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, getDoc } from "./firebase-config.js";

        // 1. Session State Observer
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Authenticated user:", user.email);
                
                try {
                    // Fetch profile record from the database collection
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        document.getElementById('user-display-name').innerText = userData.fullName;
                    } else {
                        document.getElementById('user-display-name').innerText = user.email;
                    }
                } catch (error) {
                    console.error("Error retrieving profile dataset:", error);
                    document.getElementById('user-display-name').innerText = user.email;
                }

            } else {
                console.log("Session not found. Redirecting to login context...");
                window.location.href = "login.html";
            }
        });

        // 2. Sign-Out Action Event Listener
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                signOut(auth).then(() => {
                    console.log("Sign-out process complete.");
                    window.location.href = "login.html";
                }).catch((error) => {
                    alert("Sign-out error: " + error.message);
                });
            });
        }
    </script>

</body>
</html>
